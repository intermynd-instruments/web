<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title></title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans:  ['Inter', 'system-ui', '-apple-system', 'sans-serif'],
            pixel: ['Pixel', 'monospace'],
          },
        }
      }
    }
  </script>

  <!-- Intermynd Design System -->
  <link rel="stylesheet" href="intermynd.css">
</head>
<body class="bg-white text-neutral-900 font-sans antialiased">

  <!-- ================================================================== -->
  <!-- Navbar                                                              -->
  <!-- ================================================================== -->
  <header class="fixed top-0 left-0 right-0 z-50 bg-[var(--color-primary)]">
    <nav class="w-full px-3 lg:px-16 h-16 flex items-center justify-between">
      <a href="/" class="flex items-center">
        <img src="logo.svg" alt="" class="h-16 w-auto">
      </a>

      <!-- Desktop links -->
      <div class="hidden md:flex items-center gap-8 text-sm font-medium text-white/70">
        <a href="#" class="hover:text-white transition-colors">Link</a>
      </div>

      <!-- Desktop CTA -->
      <div class="hidden md:flex items-center gap-4">
        <a href="#" class="px-4 py-1.5 rounded-full border border-white/40 text-white/80 hover:border-white hover:text-white transition-all text-xs font-semibold tracking-wide uppercase">CTA</a>
      </div>

      <!-- Hamburger -->
      <button id="menu-btn" class="md:hidden flex flex-col gap-1.5 w-7 h-7 justify-center items-end z-50" aria-label="Toggle menu">
        <span class="hamburger-line hamburger-top block w-6 h-[2px] bg-white rounded-full"></span>
        <span class="hamburger-line hamburger-mid block w-5 h-[2px] bg-white rounded-full"></span>
        <span class="hamburger-line hamburger-bot block w-6 h-[2px] bg-white rounded-full"></span>
      </button>
    </nav>

    <!-- Mobile menu -->
    <div id="mobile-menu" class="hidden md:hidden border-t border-white/20 bg-[var(--color-primary)]">
      <div class="px-6 py-6 flex flex-col gap-5 text-lg font-medium text-white/70">
        <a href="#" class="hover:text-white transition-colors" onclick="closeMenu()">Link</a>
      </div>
    </div>
  </header>

  <!-- ================================================================== -->
  <!-- Content                                                             -->
  <!-- ================================================================== -->
  <main>
    <!-- Section example -->
    <section class="border-t border-neutral-200">
      <div class="w-full px-3 lg:px-16 py-24">
        <p class="section-label">
          <span class="slash">/</span> Section <span>■</span>
        </p>
        <h1 class="text-3xl sm:text-4xl lg:text-5xl font-bold tracking-tight mb-4 text-neutral-900">
          Start building.
        </h1>
        <p class="text-neutral-500 max-w-2xl leading-relaxed text-sm sm:text-base">
          Replace this with your content.
        </p>
      </div>
    </section>
  </main>

  <!-- ================================================================== -->
  <!-- Footer                                                              -->
  <!-- ================================================================== -->
  <footer class="border-t border-neutral-200 bg-white">
    <div class="w-full px-3 lg:px-16 py-16">
      <div class="grid sm:grid-cols-2 lg:grid-cols-5 gap-10 mb-16">
        <div class="lg:col-span-2">
          <a href="/" class="flex items-center gap-3">
            <img src="logo.svg" alt="" class="h-8 w-auto">
            <span class="text-neutral-500 font-medium text-xs tracking-wider uppercase">Intermynd</span>
          </a>
          <p class="text-sm text-neutral-500 mt-3 max-w-xs leading-relaxed">
            Small-batch instruments for musicians who want a more modern workflow.
          </p>
        </div>
        <div>
          <p class="text-xs font-semibold tracking-[0.2em] uppercase text-[var(--color-primary)] mb-4">/ Link</p>
          <div class="flex flex-col gap-2 text-sm text-neutral-500">
            <a href="#" class="hover:text-[var(--color-primary)] transition-colors">Item</a>
          </div>
        </div>
      </div>
      <div class="border-t border-neutral-200 pt-8 flex items-center justify-between gap-4">
        <p class="text-xs text-neutral-400">Intermynd Instruments &copy; 2026</p>
        <a href="#" class="text-xs text-neutral-400 hover:text-[var(--color-primary)] transition-colors flex items-center gap-1">
          Back to top
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M6 10V2M2 6l4-4 4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </a>
      </div>
    </div>
  </footer>

  <script>
    const menuBtn = document.getElementById('menu-btn');
    const mobileMenu = document.getElementById('mobile-menu');
    menuBtn?.addEventListener('click', () => {
      mobileMenu.classList.toggle('hidden');
      menuBtn.classList.toggle('mobile-menu-open');
    });
    function closeMenu() {
      mobileMenu?.classList.add('hidden');
      menuBtn?.classList.remove('mobile-menu-open');
    }
  </script>
</body>
</html>
